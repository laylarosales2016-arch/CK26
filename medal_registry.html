<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chowking Medal Registry | Cosmic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: {
                            950: '#030712',
                            900: '#0b0f19',
                            800: '#111827',
                            700: '#1f2937',
                            400: '#9ca3af'
                        },
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            background-image: linear-gradient(to bottom, rgba(3, 7, 18, 0.85), rgba(11, 15, 25, 0.92)),
                              url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f3f4f6;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        .loader { border-top-color: #22d3ee; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        .glass-card {
            background: rgba(11, 15, 25, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .table-header-text {
            color: #22d3ee;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.85;
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex items-center justify-center">

<!-- Login Section -->
<div id="login-container" class="glass-card p-10 rounded-[2.5rem] w-full max-w-md text-center">
    <div class="mx-auto mb-8">
        <img src="https://uhmjgnwpzsemksxcjpiz.supabase.co/storage/v1/object/sign/backups/chowking/chowking.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8zMmIxMDMyNi1lNzE2LTQ2YTktYjJlNi1lMmNjZGUwN2ZjNmUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJiYWNrdXBzL2Nob3draW5nL2Nob3draW5nLmpwZyIsImlhdCI6MTc4MDQ5NjcxMCwiZXhwIjoyNTY4ODk2NzEwfQ.9oOjED0SwmUkMpAdopHt50aF2H2tMz5KWx5Mgkt2-j8" alt="Chowking Logo" class="w-24 h-24 object-contain mx-auto">
    </div>
    <h2 class="text-2xl font-black tracking-tight text-white mb-2">Medal Registry</h2>
    <p class="text-space-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-8 opacity-60">Enter secure key to access registry</p>

    <div class="relative mb-6 text-left">
        <label class="text-[10px] font-black text-cyan-400 uppercase tracking-widest ml-4 mb-2 block">Access Password</label>
        <input type="password" id="sys-pass" onkeydown="if(event.key==='Enter') checkAuth()" placeholder="••••••••" class="bg-space-950/80 border border-white/10 text-white rounded-xl px-6 py-4 font-semibold text-sm outline-none focus:ring-2 focus:ring-cyan-500 transition-all w-full shadow-inner">
        <p id="auth-error" class="text-rose-400 text-[10px] font-bold uppercase tracking-widest mt-3 ml-4 hidden">Access Denied: Invalid Key</p>
    </div>

    <button onclick="checkAuth()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-space-950 font-black uppercase text-xs tracking-[0.2em] py-4 rounded-xl transition-all shadow-lg active:scale-95 shadow-cyan-500/10">Authorize Access</button>
</div>

<!-- Registry Content -->
<div id="registry-container" class="hidden w-full max-w-4xl mx-auto">
    <header class="flex items-center justify-between mb-10">
        <div class="flex items-center space-x-5">
            <img src="https://uhmjgnwpzsemksxcjpiz.supabase.co/storage/v1/object/sign/backups/chowking/chowking.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8zMmIxMDMyNi1lNzE2LTQ2YTktYjJlNi1lMmNjZGUwN2ZjNmUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJiYWNrdXBzL2Nob3draW5nL2Nob3draW5nLmpwZyIsImlhdCI6MTc4MDQ5NjcxMCwiZXhwIjoyNTY4ODk2NzEwfQ.9oOjED0SwmUkMpAdopHt50aF2H2tMz5KWx5Mgkt2-j8" alt="Chowking Logo" class="w-12 h-12 object-contain">
            <div>
                <h1 class="text-xl font-black tracking-tight text-white">Personnel Medal Registry</h1>
                <p id="countdown-range" class="text-cyan-400/60 text-[9px] font-bold uppercase tracking-[0.3em]">Synchronizing Timeline...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-space-400 hover:text-white text-[10px] font-bold uppercase tracking-widest transition-colors"><i class="fa-solid fa-power-off mr-2"></i>Exit</button>
    </header>

    <div class="glass-card rounded-[2.5rem] overflow-hidden">
        <div class="px-10 py-6 border-b border-white/5 bg-space-900/40 flex justify-between items-center">
            <h3 class="table-header-text">Medal Standings</h3>
            <div id="sync-indicator" class="h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></div>
        </div>
        <div id="medal-list" class="overflow-x-auto">
            <div class="p-20 text-center text-space-400">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-space-700 h-10 w-10 mx-auto mb-4"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-50">Fetching Data...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://uhmjgnwpzsemksxcjpiz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVobWpnbndwenNlbWtzeGNqcGl6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODMyNDU2NCwiZXhwIjoyMDkzOTAwNTY0fQ.SVdNjQlocvBEwwxl2K_7BMT94vUq5fkNRev65fXrvyc';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const REGISTRY_PASS = 'medal2026';
    let employees = [];
    let allAttendance = [];
    let medalCountdownStart = null;

    function checkAuth() {
        const pass = document.getElementById('sys-pass').value;
        const error = document.getElementById('auth-error');
        if (pass === REGISTRY_PASS) {
            sessionStorage.setItem('medal_registry_auth', 'true');
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('registry-container').classList.remove('hidden');
            document.body.classList.remove('items-center', 'justify-center');
            initializeData();
        } else {
            error.classList.remove('hidden');
            document.getElementById('sys-pass').value = '';
        }
    }

    function logout() {
        sessionStorage.removeItem('medal_registry_auth');
        location.reload();
    }

    window.onload = () => {
        if (sessionStorage.getItem('medal_registry_auth') === 'true') {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('registry-container').classList.remove('hidden');
            document.body.classList.remove('items-center', 'justify-center');
            initializeData();
        }
    };

    async function initializeData() {
        const listContainer = document.getElementById('medal-list');
        try {
            console.log("Starting data initialization...");
            // Fetch employees and filter out management positions
            const { data: emps, error: empErr } = await sb.from('employees')
                .select('employee_no, first_name, last_name, position');

            if (empErr) {
                console.error("Employee fetch error:", empErr);
                throw new Error(`Employees Table: ${empErr.message || empErr.details}`);
            }

            const excludedPositions = ["Manager", "Assistant Manager", "Excrew", "Coordinator", "Senior Crew", "Administrator"];
            employees = (emps || []).filter(emp => {
                const pos = (emp.position || "").trim();
                return !excludedPositions.some(ex => pos.toLowerCase() === ex.toLowerCase());
            });

            console.log(`Fetched ${emps?.length || 0} total, showing ${employees.length} crew members`);

            const { data: att, error: attErr } = await sb.from('attendance_records')
                .select('employee_id, date, status, note');

            if (attErr) {
                console.error("Attendance fetch error:", attErr);
                throw new Error(`Attendance Table: ${attErr.message || attErr.details}`);
            }
            allAttendance = att || [];
            console.log(`Fetched ${allAttendance.length} attendance records`);

            const { data: settings } = await sb.from('settings')
                .select('value')
                .eq('key', 'medal_countdown_start')
                .maybeSingle();

            medalCountdownStart = settings ? settings.value : null;
            console.log(`Medal countdown start: ${medalCountdownStart}`);

            renderMedals();
        } catch (err) {
            console.error("Initialization error:", err);
            listContainer.innerHTML = `
                <div class="p-20 text-center">
                    <div class="bg-rose-500/10 border border-rose-500/20 rounded-2xl p-8 max-w-sm mx-auto">
                        <i class="fa-solid fa-triangle-exclamation text-rose-500 text-3xl mb-4"></i>
                        <p class="text-white font-bold uppercase tracking-widest text-sm">Registry Sync Failed</p>
                        <p class="text-rose-400/80 text-[10px] mt-4 font-mono break-words bg-black/40 p-3 rounded-lg">${err.message || 'Unknown Connection Error'}</p>
                        <button onclick="initializeData()" class="mt-8 w-full py-3 bg-cyan-500 text-space-950 text-[10px] font-black uppercase rounded-xl hover:bg-cyan-400 transition-colors">Retry Connection</button>
                    </div>
                </div>
            `;
        }
    }

    function renderMedals() {
        let startDate;
        try {
            startDate = medalCountdownStart ? new Date(medalCountdownStart) : new Date();
            if (isNaN(startDate.getTime())) throw new Error("Invalid start date");
            if (!medalCountdownStart) startDate.setDate(startDate.getDate() - 30);
        } catch (e) {
            startDate = new Date();
            startDate.setDate(startDate.getDate() - 30);
        }

        startDate.setHours(0,0,0,0);
        const endDate = new Date(startDate);
        endDate.setDate(endDate.getDate() + 30);

        document.getElementById('countdown-range').innerText = `${startDate.toDateString()} — ${endDate.toDateString()}`;

        const medalMap = {};
        allAttendance.forEach(r => {
            const d = new Date(r.date);
            if (!isNaN(d.getTime()) && d >= startDate && d < endDate && (r.status === 'LATE' || r.status === 'OVERBREAK')) {
                const eid = r.employee_id;
                if (!medalMap[eid]) medalMap[eid] = { gold: 0, silver: 0 };
                const note = r.note || "";
                const match = note.match(/\((\d+)\s*mins\)/);
                if (match) {
                    const mins = parseInt(match[1]);
                    if (mins >= 5) medalMap[eid].gold++; else medalMap[eid].silver++;
                } else {
                    medalMap[eid].gold++;
                }
            }
        });

        const listContainer = document.getElementById('medal-list');
        if (employees.length === 0) {
            listContainer.innerHTML = '<div class="p-20 text-center text-space-400 text-[10px] font-bold uppercase tracking-widest opacity-50">No Personnel Found</div>';
            return;
        }

        let html = `
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-space-900/60 border-b border-white/10">
                        <th class="px-10 py-4 table-header-text">Personnel</th>
                        <th class="px-10 py-4 table-header-text">Employee ID</th>
                        <th class="px-10 py-4 table-header-text">Gold Medals</th>
                        <th class="px-10 py-4 table-header-text">Silver Medals</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">`;

        employees.sort((a,b) => (a.last_name || '').localeCompare(b.last_name || '')).forEach(emp => {
            const m = medalMap[emp.employee_no] || { gold: 0, silver: 0 };
            html += `
                <tr class="hover:bg-cyan-500/[0.02] transition-colors">
                    <td class="px-10 py-4">
                        <span class="font-bold text-slate-100 text-sm">${emp.first_name || ''} ${emp.last_name || ''}</span>
                        <p class="text-[9px] text-space-400 font-bold uppercase tracking-wider">${emp.position || 'Crew'}</p>
                    </td>
                    <td class="px-10 py-4 font-mono text-xs text-cyan-400/80">${emp.employee_no || 'N/A'}</td>
                    <td class="px-10 py-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg font-black text-white">${m.gold}</span>
                            <div class="flex">${'<i class="fa-solid fa-medal text-amber-400 text-xs shadow-[0_0_8px_rgba(251,191,36,0.4)] ml-0.5"></i>'.repeat(m.gold)}</div>
                        </div>
                    </td>
                    <td class="px-10 py-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg font-black text-white">${m.silver}</span>
                            <div class="flex">${'<i class="fa-solid fa-medal text-slate-400 text-xs shadow-[0_0_8px_rgba(148,163,184,0.4)] ml-0.5"></i>'.repeat(m.silver)}</div>
                        </div>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        listContainer.innerHTML = html;
        document.getElementById('sync-indicator').classList.remove('animate-pulse');
    }
</script>
</body>
</html>
