name: Auto APK Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto-Increment Version
        id: auto_inc
        run: |
          # 1. Get current values
          OLD_CODE=$(grep "versionCode =" app/build.gradle.kts | awk -F' = ' '{print $2}' | tr -d ' ')
          OLD_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F' = ' '{print $2}' | tr -d '"' | tr -d ' ')
          
          # 2. Increment values
          NEW_CODE=$((OLD_CODE + 1))
          NEW_NAME=$((OLD_NAME + 1))
          
          # 3. Update build.gradle.kts using sed
          sed -i "s/versionCode = $OLD_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$OLD_NAME\"/versionName = \"$NEW_NAME\"/" app/build.gradle.kts
          
          echo "NEW_CODE=$NEW_CODE" >> $GITHUB_ENV
          echo "NEW_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "tag_name=v$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.auto_inc.outputs.tag_name }}
          name: Release ${{ env.NEW_NAME }} (${{ env.NEW_CODE }})
          draft: false
          prerelease: false
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Update Config JSON
        run: |
          SIGNED_APK_NAME=$(basename ${{ steps.sign_app.outputs.signedReleaseFile }})
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.auto_inc.outputs.tag_name }}/$SIGNED_APK_NAME"
          cat <<EOF > update_config.json
          {
            "versionCode": ${{ env.NEW_CODE }},
            "versionName": "${{ env.NEW_NAME }}",
            "downloadUrl": "$DOWNLOAD_URL",
            "isForceUpdate": false,
            "changes": "Automatic version bump Release."
          }
          EOF

      - name: Commit and Push Updated Version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/build.gradle.kts update_config.json
          git commit -m "Auto-increment version to ${{ env.NEW_NAME }} [skip ci]" || echo "No changes to commit"
          git push
