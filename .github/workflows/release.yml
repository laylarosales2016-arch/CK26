name: Auto APK Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Get Version Info
        id: version_info
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F' = ' '{print $2}' | tr -d '"' | tr -d ' ')
          VERSION_CODE=$(grep "versionCode =" app/build.gradle.kts | awk -F' = ' '{print $2}' | tr -d ' ')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "tag_name=v$VERSION_NAME-$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version_info.outputs.tag_name }}
          name: Release ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }})
          draft: false
          prerelease: false
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Update Config JSON
        run: |
          SIGNED_APK_NAME=$(basename ${{ steps.sign_app.outputs.signedReleaseFile }})
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version_info.outputs.tag_name }}/$SIGNED_APK_NAME"
          cat <<EOF > update_config.json
          {
            "versionCode": ${{ env.VERSION_CODE }},
            "versionName": "${{ env.VERSION_NAME }}",
            "downloadUrl": "$DOWNLOAD_URL",
            "isForceUpdate": false,
            "changes": "Official Signed Release build."
          }
          EOF

      - name: Commit and Push update_config.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add update_config.json
          git commit -m "Update update_config.json to ${{ env.VERSION_NAME }}" || echo "No changes to commit"
          git push
